# ─────────────────────────────────────────────────────────────────
# config.yaml — Configuración del sistema de backup inteligente
#
# interval: segundos entre cada ciclo de backup
# files:    lista de pares origen → destino
# ─────────────────────────────────────────────────────────────────

interval: 10

method: fread   # opciones: syscall | fread

files:
  - source: prueba.txt
    destination: copia.txt